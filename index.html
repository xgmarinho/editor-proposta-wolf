<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08080a" />
    <title>Agencia Wolf - Proposta</title>
    <style>
      #wolfgate{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;
        background:#08080a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#f4f4f5}
      #wolfgate .card{width:100%;max-width:380px;margin:0 24px;background:#111114;border:1px solid #232327;
        border-radius:16px;padding:36px 32px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
      #wolfgate .brand{font-size:17px;font-weight:600;letter-spacing:.3px;margin:0 0 4px}
      #wolfgate .sub{font-size:13px;color:#8a8a92;margin:0 0 26px}
      #wolfgate label{display:block;font-size:12px;color:#8a8a92;margin:0 0 8px;text-transform:uppercase;letter-spacing:.6px}
      #wolfgate input{width:100%;box-sizing:border-box;background:#0a0a0c;border:1px solid #2a2a2f;border-radius:10px;
        padding:13px 14px;color:#f4f4f5;font-size:14px;outline:none;transition:border-color .15s}
      #wolfgate input:focus{border-color:#c0392b}
      #wolfgate button{width:100%;margin-top:18px;background:#c0392b;color:#fff;border:none;border-radius:10px;
        padding:13px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
      #wolfgate button:hover{background:#a93226}
      #wolfgate .err{color:#e05a4d;font-size:12px;margin-top:12px;min-height:16px}
    </style>
    <script>
      (function () {
        var K = "wolf.publishToken";
        if (localStorage.getItem(K)) return; // já logado: deixa o app rodar normal
        var _p = window.prompt;
        window.prompt = function () { return ""; };
        document.addEventListener("DOMContentLoaded", function () {
          var g = document.createElement("div");
          g.id = "wolfgate";
          g.innerHTML =
            '<div class="card">' +
            '<div class="brand">Agência Wolf</div>' +
            '<div class="sub">Pipeline de propostas — acesso restrito</div>' +
            '<form>' +
            '<label for="wg-tk">Token de acesso</label>' +
            '<input id="wg-tk" type="password" autocomplete="current-password" autofocus placeholder="••••••••••••" />' +
            '<button type="submit">Entrar</button>' +
            '<div class="err"></div>' +
            '</form>' +
            '</div>';
          document.body.appendChild(g);
          var form = g.querySelector("form");
          var input = g.querySelector("#wg-tk");
          var err = g.querySelector(".err");
          form.addEventListener("submit", function (e) {
            e.preventDefault();
            var t = (input.value || "").trim();
            if (!t) { err.textContent = "Informe o token."; input.focus(); return; }
            localStorage.setItem(K, t);
            window.prompt = _p;
            location.reload();
          });
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
